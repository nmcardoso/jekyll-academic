{% assign title = page.title | default: site.title %}
{% assign subtitle = page.subtitle | default: site.subtitle %}

<header 
  class="masthead text-white text-shadow inner-shadow" 
  {% if include.member %}
    style="padding-top: 5rem; padding-bottom: 5rem; background-image: url('{{ page.image }}');"
  {% elsif include.image %}
    style="background-image: url('{{ page.image }}')" 
  {% endif %}>
  <div class="overlay"></div>
  <div class="container">
    <div class="row">
      <div class="col-xl-9">
        {% if page.masterhead_profile %}
          <div class="d-flex align-items-center flex-column flex-sm-row">
            <div class="">
              {% include member_picture.html member=page size=150 %}
            </div>
            <div class="mt-3 mt-sm-0 ms-sm-4 text-center text-sm-left">
              <span 
                class="w-600 text-uppercase text-light"
                style="font-size: 2rem; letter-spacing: .15rem;">
                {{ page.title }}
              </span>
            </div>
          </div>
        {% else %}
          <h1 {% if boldtitle %} class="w-600" {% endif %}>{{ title }}</h1>
          <h2 class="w-500">{{ subtitle }}</h2>
        {% endif %}
      </div>
    </div>
  </div>
</header>

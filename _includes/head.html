<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />

  <link rel="dns-prefetch" href="https://github.com" />
  <link rel="dns-prefetch" href="https://avatars0.githubusercontent.com" />
  <link rel="dns-prefetch" href="https://avatars1.githubusercontent.com" />
  <link rel="dns-prefetch" href="https://avatars2.githubusercontent.com" />
  <link rel="dns-prefetch" href="https://avatars3.githubusercontent.com" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  {% if page.doi %}
    <meta name="dc.identifier" content="{{ page.doi }}" />
    <meta name="citation_doi" content="{{ page.doi }}" />
    <meta name="citation_title" content="{{ page.title }}" />
    <meta name="citation_publication_date" content="{{ page.date | date: '%Y' }}" />
    <meta name="citation_journal_title" content="{{ page.venue | venue_name }}" />
    {% if page.pdf %}
      <meta name="citation_pdf_url" content="{{ page.pdf }}" />
    {% endif %}
  {% endif %}

  {% comment %}
    <meta name="citation_pii" content="S0099133307000912" />
    <meta name="citation_issn" content="0099-1333" />
    <meta name="citation_volume" content="33" />
    <meta name="citation_lastpage" content="506" />
    <meta name="citation_issue" content="4" />
    <meta name="citation_publisher" content="JAI" />
    <meta name="citation_firstpage" content="501" />
    <meta name="citation_title" content="A Study of HTML Title Tag Creation Behavior of Academic Web Sites" />
    <meta name="citation_type" content="JOUR" />
    <meta name="citation_article_type" content="Full-length article" />
    <meta name="citation_online_date" content="2007/05/02" />
    <meta name="description" content="{{ page.description | default: site.description }}" />
    <meta name="twitter:description" content="{{ page.description | default: site.description }}" />
    <meta name="og:image" content="{{ page.image | default: site.logo | absolute_url }}" />
    <meta name="twitter:image" content="{{ page.image | default: site.logo | absolute_url }}" />
    <meta property=og:description content="The HTML title tag information should identify and describe exactly what a Web page contains. This paper analyzes the Title element and raises a signi…" />
  {% endcomment %}
  
  <meta name="image" content="{{ page.image | default: site.logo | absolute_url }}" />
  <meta name="og:description" content="{{ page.description | default: site.description }}" />

  {% for icon in site.icons %}
    <link 
      rel="{{ icon.rel | default: 'icon' }}" 
      type="{{ icon.type | default: 'image/x-icon' }}" 
      {% if icon.sizes %}sizes="{{ icon.sizes }}"{% endif %}
      href="{{ icon.href | relative_url }}" />
  {% endfor %}

  {% if site.manifest %}
    <link rel="manifest" href="{{ site.manifest }}" />
  {% endif %}

  {% seo %}

  <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
    rel="stylesheet" 
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
    crossorigin="anonymous" />
  
  <link 
    rel="stylesheet" 
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" 
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" 
    crossorigin="anonymous" 
    referrerpolicy="no-referrer" />
    
  <link 
    href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" 
    rel="stylesheet" />
  
  <!-- <link 
    rel="stylesheet" 
    href="https://cdn.jsdelivr.net/npm/pygments-css@1.0.0/github.css"> -->
  
  <link 
    rel="stylesheet" 
    type="text/css" 
    href="https://cdn.jsdelivr.net/gh/dreampulse/computer-modern-web-font@master/fonts.css" />

  <link
    rel="stylesheet"
    type="text/css"
    href="{{ '/assets/vendor/pygments/theme-dracula.css' | relative_url }}" />
  
  <link 
    rel="stylesheet" 
    href="{{ '/assets/css/app.css' | relative_url }}?v={{ site.time | date: '%s' }}" />
  
  <script src="{{ '/assets/js/theme.js' | relative_url }}?v={{ site.time | date: '%s' }}">
  </script>
</head>

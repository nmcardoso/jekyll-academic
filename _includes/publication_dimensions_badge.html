{% if page.doi %}
  {% capture src %}data-doi="{{ page.doi }}"{% endcapture %}
{% elsif page.pmid %}
  {% capture src %}data-pmid="{{ page.pmid }}"{% endcapture %}
{% else %}
  {% assign src = nil %}
{% endif %}

{% if page.dimensions.enabled and src%}
  <span 
  class="__dimensions_badge_embed__" 
  {% if page.dimensions.hide_uncited %}data-hide-zero-citations="true"{% endif %}
  data-legend="{{ page.dimensions.legend }}"
  {{ src }}>
  </span>
{% endif %}

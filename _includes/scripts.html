<script 
  src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
  integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" 
  crossorigin="anonymous">
</script>

<script 
  src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/js/all.min.js" 
  integrity="sha512-6BTOlkauINO65nLhXhthZMtepgJSghyimIalb+crKRPhvhmsCdnIuGcVbR5/aQY2A+260iC1OPy1oCdB6pSSwQ==" 
  crossorigin="anonymous" 
  referrerpolicy="no-referrer">
</script>

<script 
  src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/4.0.0/tex-mml-chtml.min.js" 
  integrity="sha512-yxTB34XQUKlyuz73upeDrZ91/tbZW/YAURVWL3s+09bEWdmORQzUZwSKyBIRxSeHuSwh1aOKEffn2/D65kwyYg==" 
  crossorigin="anonymous" 
  referrerpolicy="no-referrer">
</script>

<script 
  src="{{ '/assets/js/app.js' | relative_url }}?v={{ site.time | date: '%s' }}">
</script>

{% if site.gtag %}
  <script 
    async 
    type="text/javascript"
    src="https://www.googletagmanager.com/gtag/js?id={{ site.gtag }}">
  </script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', '{{ site.gtag }}');
  </script>
{% endif %}

{% if page.dimensions.enabled %}
  <script 
    async 
    src="https://badge.dimensions.ai/static/ai/badge.js" 
    charset="utf-8">
  </script>
{% endif %}

{% if page.altmetric.enabled %}
  <script 
    type='text/javascript' 
    src='https://embed.altmetric.com/assets/embed.js'>
  </script>
{% endif %}

<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs'
  mermaid.initialize({ startOnLoad: true })
  document.querySelectorAll('pre > code.language-mermaid').forEach((codeBlock) => {
    codeBlock.parentElement.outerHTML = `<pre class="mermaid text-center mb-2">${codeBlock.textContent}</pre>`
  });
</script>
